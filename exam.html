<!DOCTYPE html>
<html>
<head>
    <title>Exam</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: beige;
        }
        div { 
            background-color:white;
            border:2px solid black;
            width: fit-content ;
        }
        div h2{
            text-align: center;
        }
    </style>
</head>
<body>
<div>
    <h2>Questionnaire</h2>

    <form onsubmit="checkAnswers(); return false;">

        <p>
            1. What is my academic strand?
        </p>
        <input type="radio" name="q1" value="stem"> a. STEM<br>
        <input type="radio" name="q1" value="humss"> b. HUMSS<br>
        <input type="radio" name="q1" value="abm"> c. ABM<br>
        <input type="radio" name="q1" value="tvl"> d. TVL<br><br>

        <p>
            2. When is my birthday?
        </p>
        <input type="text" id="q2" placeholder="Example: May 21"><br><br>

        <p>
            3. Random question: What is the value of x in 3x = 15?
        </p>
        <input type="radio" name="q3" value="2"> a. 2<br>
        <input type="radio" name="q3" value="3"> b. 3<br>
        <input type="radio" name="q3" value="5"> c. 5<br>
        <input type="radio" name="q3" value="9"> d. 9<br><br>

        <button type="button" id="submitBtn" onclick="handleSubmit()">Submit</button>
    </form>
</div>
    <script>
        let clickCount = 0;

        function handleSubmit() {
            const btn = document.getElementById("submitBtn");
            clickCount++;

            if (clickCount === 1) {
                btn.innerText = "Are you sure?";
                return;
            }

            if (clickCount === 2) {
                btn.innerText = "Really sure?";
                return;
            }

            // Third click → actually check answers
            checkAnswers();
        }

        function triggerConfetti() {
            confetti( {
                particleCount: 250,
                spread: 200,
                origin: {
                    y: 0.2
                }
            });
        }

        function checkAnswers() {

            let q1 = document.querySelector('input[name="q1"]:checked');
            let q2 = document.getElementById("q2").value.toLowerCase().trim();
            let q3 = document.querySelector('input[name="q3"]:checked');

            let message = "";

            if (!q1) {
                message += "You didn't answer Question 1.\n";
            } else if (q1.value !== "humss") {
                message += "Question 1 is wrong.\n";
            }

            if (q2 === "") {
                message += "You didn't answer Question 2.\n";
            } else if (q2 !== "june 3") {
                message += "Question 2 is wrong.\n";
            }

            if (!q3) {
                message += "You didn't answer Question 3.\n";
            } else if (q3.value !== "5") {
                message += "Question 3 is wrong.\n";
            }

            if (message === "") {

                triggerConfetti(); // 🎉 Confetti happens ONLY here

                setTimeout(() => {
                    alert("All answers correct! You passed 😎");
                }, 300);

            } else {
                alert(message);
            }

            // Reset button after checking
            clickCount = 0;
            document.getElementById("submitBtn").innerText = "Submit";
        }

    </script>
</body>
</html>
